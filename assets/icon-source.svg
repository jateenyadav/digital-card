<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2b4d"/>
      <stop offset="1" stop-color="#E4002B"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- subtle 3D tonal arcs (Hitachi red texture nod) -->
  <g opacity="0.18" stroke="#E4002B" stroke-width="3" fill="none">
    <circle cx="256" cy="256" r="205"/>
    <circle cx="256" cy="256" r="165"/>
    <circle cx="256" cy="256" r="125"/>
  </g>
  <!-- JY monogram -->
  <text x="256" y="238" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif"
        font-size="210" font-weight="800" letter-spacing="-8"
        fill="url(#red)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">JY</text>
  <!-- Inspire-the-next style underscore -->
  <rect x="150" y="352" width="212" height="14" rx="7" fill="url(#red)"/>
</svg>
